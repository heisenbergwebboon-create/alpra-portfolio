<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bloom</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: radial-gradient(
        ellipse at center,
        #3D4528 0%,
        #2A3018 55%,
        #1A1F0E 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      transition: opacity 1.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    body.fade-out {
      opacity: 0;
    }

    .tap-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 1s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .tap-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .pulse-wrap {
      position: relative;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
    }

    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(250, 247, 236, 0.2);
      animation: ringExpand 2.4s ease-out infinite;
    }

    .pulse-ring:nth-child(1) {
      width: 44px;
      height: 44px;
      animation-delay: 0s;
    }

    .pulse-ring:nth-child(2) {
      width: 56px;
      height: 56px;
      animation-delay: 0.5s;
    }

    .pulse-ring:nth-child(3) {
      width: 68px;
      height: 68px;
      animation-delay: 1s;
    }

    @keyframes ringExpand {
      0% {
        transform: scale(0.7);
        opacity: 0.5;
      }
      100% {
        transform: scale(1.3);
        opacity: 0;
      }
    }

    .pulse-dot {
      width: 9px;
      height: 9px;
      background: #FAF7EC;
      border-radius: 50%;
      position: relative;
      z-index: 2;
      box-shadow:
        0 0 18px rgba(250, 247, 236, 0.5),
        0 0 40px rgba(250, 247, 236, 0.15);
      animation: dotBreathe 2.4s ease-in-out infinite;
    }

    @keyframes dotBreathe {
      0%, 100% {
        transform: scale(1);
        opacity: 0.55;
      }
      50% {
        transform: scale(1.5);
        opacity: 1;
      }
    }

    .tap-text {
      color: rgba(250, 247, 236, 0.55);
      font-style: italic;
      font-size: 13px;
      letter-spacing: 0.38em;
      text-transform: lowercase;
      animation: textBreathe 2.4s ease-in-out infinite;
      user-select: none;
    }

    @keyframes textBreathe {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .stage {
      position: relative;
      width: 88vmin;
      height: 88vmin;
      max-width: 580px;
      max-height: 580px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.96);
      transition:
        opacity 1.2s cubic-bezier(0.25, 0.1, 0.25, 1),
        transform 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
      will-change: opacity, transform;
    }

    .stage.active {
      opacity: 1;
      transform: scale(1);
    }

    .flower-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 0 0px rgba(255,255,255,0));
    }

    .stage.active .flower-svg {
      animation: flowerGlow 5s ease-in-out 4.5s infinite;
    }

    @keyframes flowerGlow {
      0%, 100% {
        filter:
          drop-shadow(0 0 28px rgba(250, 247, 236, 0.22))
          drop-shadow(0 0 55px rgba(212, 184, 134, 0.09));
      }
      50% {
        filter:
          drop-shadow(0 0 48px rgba(250, 247, 236, 0.42))
          drop-shadow(0 0 90px rgba(212, 184, 134, 0.18));
      }
    }

    .bud {
      fill: #EDE8D5;
      opacity: 1;
      transform-origin: 300px 300px;
    }

    .stage.active .bud {
      animation: budShrink 0.6s ease-out 3.6s forwards;
    }

    @keyframes budShrink {
      to {
        opacity: 0;
        transform: scale(0);
      }
    }

    .p-out {
      fill: url(#gOut);
      opacity: 0;
      transform-origin: 300px 300px;
      will-change: transform, opacity;
    }

    .stage.active .po1 { animation: openO1 2s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards; }
    .stage.active .po2 { animation: openO2 2s cubic-bezier(0.22, 1, 0.36, 1) 0.58s forwards; }
    .stage.active .po3 { animation: openO3 2s cubic-bezier(0.22, 1, 0.36, 1) 0.76s forwards; }
    .stage.active .po4 { animation: openO4 2s cubic-bezier(0.22, 1, 0.36, 1) 0.94s forwards; }
    .stage.active .po5 { animation: openO5 2s cubic-bezier(0.22, 1, 0.36, 1) 1.12s forwards; }

    @keyframes openO1 {
      0%   { opacity:0; transform: scale(0.08) translateY(0); }
      45%  { opacity:0.9; }
      75%  { transform: scale(1.06) translateY(-56px); }
      100% { opacity:0.94; transform: scale(1) translateY(-52px); }
    }
    @keyframes openO2 {
      0%   { opacity:0; transform: scale(0.08) translate(0,0) rotate(72deg); }
      75%  { transform: scale(1.06) translate(50px,-17px) rotate(72deg); }
      100% { opacity:0.94; transform: scale(1) translate(46px,-15px) rotate(72deg); }
    }
    @keyframes openO3 {
      0%   { opacity:0; transform: scale(0.08) translate(0,0) rotate(144deg); }
      75%  { transform: scale(1.06) translate(32px,44px) rotate(144deg); }
      100% { opacity:0.94; transform: scale(1) translate(30px,41px) rotate(144deg); }
    }
    @keyframes openO4 {
      0%   { opacity:0; transform: scale(0.08) translate(0,0) rotate(216deg); }
      75%  { transform: scale(1.06) translate(-32px,44px) rotate(216deg); }
      100% { opacity:0.94; transform: scale(1) translate(-30px,41px) rotate(216deg); }
    }
    @keyframes openO5 {
      0%   { opacity:0; transform: scale(0.08) translate(0,0) rotate(288deg); }
      75%  { transform: scale(1.06) translate(-50px,-17px) rotate(288deg); }
      100% { opacity:0.94; transform: scale(1) translate(-46px,-15px) rotate(288deg); }
    }

    .p-mid {
      fill: url(#gMid);
      opacity: 0;
      transform-origin: 300px 300px;
      will-change: transform, opacity;
    }

    .stage.active .pm1 { animation: openM1 1.8s cubic-bezier(0.22, 1, 0.36, 1) 1.45s forwards; }
    .stage.active .pm2 { animation: openM2 1.8s cubic-bezier(0.22, 1, 0.36, 1) 1.62s forwards; }
    .stage.active .pm3 { animation: openM3 1.8s cubic-bezier(0.22, 1, 0.36, 1) 1.79s forwards; }
    .stage.active .pm4 { animation: openM4 1.8s cubic-bezier(0.22, 1, 0.36, 1) 1.96s forwards; }
    .stage.active .pm5 { animation: openM5 1.8s cubic-bezier(0.22, 1, 0.36, 1) 2.13s forwards; }

    @keyframes openM1 {
      0%   { opacity:0; transform: scale(0.08) translate(0,0) rotate(36deg); }
      75%  { transform: scale(0.8) translate(0,-40px) rotate(36deg); }
      100% { opacity:1; transform: scale(0.76) translate(0,-38px) rotate(36deg); }
    }
    @keyframes openM2 {
      0%   { opacity:0; transform: scale(0.08) translate(0,0) rotate(108deg); }
      75%  { transform: scale(0.8) translate(38px,-13px) rotate(108deg); }
      100% { opacity:1; transform: scale(0.76) translate(36px,-12px) rotate(108deg); }
    }
    @keyframes openM3 {
      0%   { opacity:0; transform: scale(0.08) translate(0,0) rotate(180deg); }
      75%  { transform: scale(0.8) translate(24px,32px) rotate(180deg); }
      100% { opacity:1; transform: scale(0.76) translate(22px,30px) rotate(180deg); }
    }
    @keyframes openM4 {
      0%   { opacity:0; transform: scale(0.08) translate(0,0) rotate(252deg); }
      75%  { transform: scale(0.8) translate(-24px,32px) rotate(252deg); }
      100% { opacity:1; transform: scale(0.76) translate(-22px,30px) rotate(252deg); }
    }
    @keyframes openM5 {
      0%   { opacity:0; transform: scale(0.08) translate(0,0) rotate(324deg); }
      75%  { transform: scale(0.8) translate(-38px,-13px) rotate(324deg); }
      100% { opacity:1; transform: scale(0.76) translate(-36px,-12px) rotate(324deg); }
    }

    .p-in {
      fill: url(#gIn);
      opacity: 0;
      transform-origin: 300px 300px;
      will-change: transform, opacity;
    }

    .stage.active .pi1 { animation: openI1 1.5s cubic-bezier(0.22, 1, 0.36, 1) 2.45s forwards; }
    .stage.active .pi2 { animation: openI2 1.5s cubic-bezier(0.22, 1, 0.36, 1) 2.58s forwards; }
    .stage.active .pi3 { animation: openI3 1.5s cubic-bezier(0.22, 1, 0.36, 1) 2.71s forwards; }
    .stage.active .pi4 { animation: openI4 1.5s cubic-bezier(0.22, 1, 0.36, 1) 2.84s forwards; }
    .stage.active .pi5 { animation: openI5 1.5s cubic-bezier(0.22, 1, 0.36, 1) 2.97s forwards; }

    @keyframes openI1 {
      0%   { opacity:0; transform: scale(0) translate(0,0); }
      70%  { transform: scale(0.57) translate(0,-22px); }
      100% { opacity:0.95; transform: scale(0.52) translate(0,-20px); }
    }
    @keyframes openI2 {
      0%   { opacity:0; transform: scale(0) rotate(72deg); }
      70%  { transform: scale(0.57) translate(20px,-7px) rotate(72deg); }
      100% { opacity:0.95; transform: scale(0.52) translate(19px,-6px) rotate(72deg); }
    }
    @keyframes openI3 {
      0%   { opacity:0; transform: scale(0) rotate(144deg); }
      70%  { transform: scale(0.57) translate(13px,18px) rotate(144deg); }
      100% { opacity:0.95; transform: scale(0.52) translate(12px,16px) rotate(144deg); }
    }
    @keyframes openI4 {
      0%   { opacity:0; transform: scale(0) rotate(216deg); }
      70%  { transform: scale(0.57) translate(-13px,18px) rotate(216deg); }
      100% { opacity:0.95; transform: scale(0.52) translate(-12px,16px) rotate(216deg); }
    }
    @keyframes openI5 {
      0%   { opacity:0; transform: scale(0) rotate(288deg); }
      70%  { transform: scale(0.57) translate(-20px,-7px) rotate(288deg); }
      100% { opacity:0.95; transform: scale(0.52) translate(-19px,-6px) rotate(288deg); }
    }

    .p-tiny {
      fill: #FFFCF4;
      opacity: 0;
      transform-origin: 300px 300px;
    }

    .stage.active .pt1 { animation: openT1 1.2s cubic-bezier(0.22, 1, 0.36, 1) 3.1s forwards; }
    .stage.active .pt2 { animation: openT2 1.2s cubic-bezier(0.22, 1, 0.36, 1) 3.2s forwards; }
    .stage.active .pt3 { animation: openT3 1.2s cubic-bezier(0.22, 1, 0.36, 1) 3.3s forwards; }
    .stage.active .pt4 { animation: openT4 1.2s cubic-bezier(0.22, 1, 0.36, 1) 3.4s forwards; }
    .stage.active .pt5 { animation: openT5 1.2s cubic-bezier(0.22, 1, 0.36, 1) 3.5s forwards; }

    @keyframes openT1 {
      0%   { opacity:0; transform: scale(0); }
      100% { opacity:0.7; transform: scale(0.28) translate(0,-12px); }
    }
    @keyframes openT2 {
      0%   { opacity:0; transform: scale(0) rotate(72deg); }
      100% { opacity:0.7; transform: scale(0.28) translate(11px,-4px) rotate(72deg); }
    }
    @keyframes openT3 {
      0%   { opacity:0; transform: scale(0) rotate(144deg); }
      100% { opacity:0.7; transform: scale(0.28) translate(7px,10px) rotate(144deg); }
    }
    @keyframes openT4 {
      0%   { opacity:0; transform: scale(0) rotate(216deg); }
      100% { opacity:0.7; transform: scale(0.28) translate(-7px,10px) rotate(216deg); }
    }
    @keyframes openT5 {
      0%   { opacity:0; transform: scale(0) rotate(288deg); }
      100% { opacity:0.7; transform: scale(0.28) translate(-11px,-4px) rotate(288deg); }
    }

    .center-ring {
      opacity: 0;
      transform-origin: 300px 300px;
      transform: scale(0);
    }

    .stage.active .center-ring {
      animation: centerPop 0.7s cubic-bezier(0.16, 1, 0.3, 1) 3.7s forwards;
    }

    @keyframes centerPop {
      0%   { opacity:0; transform: scale(0); }
      60%  { transform: scale(1.18); }
      100% { opacity:1; transform: scale(1); }
    }

    .center-inner {
      opacity: 0;
      transform-origin: 300px 300px;
      transform: scale(0);
    }

    .stage.active .center-inner {
      animation: centerPop 0.55s cubic-bezier(0.16, 1, 0.3, 1) 3.85s forwards;
    }

    .center-shine {
      opacity: 0;
    }

    .stage.active .center-shine {
      animation: shineFade 0.5s ease 4.0s forwards;
    }

    @keyframes shineFade {
      to { opacity: 0.75; }
    }

    .pollen-dot {
      fill: rgba(100, 72, 30, 0.5);
      opacity: 0;
    }

    .stage.active .pollen-dot {
      animation: pollenPop 0.35s ease forwards;
    }

    .stage.active .pollen-dot:nth-child(1)  { animation-delay: 3.95s; }
    .stage.active .pollen-dot:nth-child(2)  { animation-delay: 4.0s; }
    .stage.active .pollen-dot:nth-child(3)  { animation-delay: 4.05s; }
    .stage.active .pollen-dot:nth-child(4)  { animation-delay: 3.98s; }
    .stage.active .pollen-dot:nth-child(5)  { animation-delay: 4.03s; }
    .stage.active .pollen-dot:nth-child(6)  { animation-delay: 4.08s; }
    .stage.active .pollen-dot:nth-child(7)  { animation-delay: 4.02s; }
    .stage.active .pollen-dot:nth-child(8)  { animation-delay: 4.06s; }
    .stage.active .pollen-dot:nth-child(9)  { animation-delay: 4.12s; }

    @keyframes pollenPop {
      to { opacity: 1; }
    }

    .particles-wrap {
      position: absolute;
      inset: -30px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .stage.active .particles-wrap {
      animation: pfade 2.5s ease 4s forwards;
    }

    @keyframes pfade {
      to { opacity: 1; }
    }

    .pt-el {
      position: absolute;
      border-radius: 50%;
    }

    .pt-el.w {
      background: rgba(250, 247, 236, 0.75);
      box-shadow: 0 0 8px rgba(250, 247, 236, 0.5);
    }

    .pt-el.g {
      background: rgba(212, 184, 134, 0.65);
      box-shadow: 0 0 7px rgba(212, 184, 134, 0.4);
    }

    .pt-el:nth-child(1)  { width:3px; height:3px; top:14%; left:18%; animation: fl1 9s ease-in-out infinite; }
    .pt-el:nth-child(2)  { width:4px; height:4px; top:22%; right:22%; animation: fl2 11s ease-in-out 0.7s infinite; }
    .pt-el:nth-child(3)  { width:2px; height:2px; top:62%; left:12%; animation: fl3 13s ease-in-out 1.4s infinite; }
    .pt-el:nth-child(4)  { width:3px; height:3px; top:70%; right:16%; animation: fl1 10s ease-in-out 0.3s infinite; }
    .pt-el:nth-child(5)  { width:5px; height:5px; top:35%; left:86%; animation: fl2 12s ease-in-out 1.9s infinite; }
    .pt-el:nth-child(6)  { width:2px; height:2px; top:80%; left:48%; animation: fl3 9.5s ease-in-out 0.9s infinite; }
    .pt-el:nth-child(7)  { width:3px; height:3px; top:10%; left:58%; animation: fl1 14s ease-in-out 2.4s infinite; }
    .pt-el:nth-child(8)  { width:4px; height:4px; top:50%; right:28%; animation: fl2 10.5s ease-in-out 0.4s infinite; }
    .pt-el:nth-child(9)  { width:2px; height:2px; top:88%; left:24%; animation: fl3 11.5s ease-in-out 1.7s infinite; }
    .pt-el:nth-child(10) { width:3px; height:3px; top:5%; right:38%; animation: fl1 12.5s ease-in-out 3.1s infinite; }
    .pt-el:nth-child(11) { width:2px; height:2px; top:45%; left:5%; animation: fl2 13s ease-in-out 2.0s infinite; }
    .pt-el:nth-child(12) { width:4px; height:4px; top:28%; left:42%; animation: fl3 8.5s ease-in-out 1.1s infinite; }

    @keyframes fl1 {
      0%,100% { transform:translate(0,0); opacity:0.2; }
      30%  { transform:translate(20px,-38px); opacity:0.85; }
      60%  { transform:translate(-16px,-62px); opacity:0.5; }
      80%  { transform:translate(10px,-28px); opacity:0.3; }
    }

    @keyframes fl2 {
      0%,100% { transform:translate(0,0); opacity:0.15; }
      25%  { transform:translate(-24px,-22px); opacity:0.75; }
      55%  { transform:translate(12px,-48px); opacity:1; }
      78%  { transform:translate(-8px,-32px); opacity:0.4; }
    }

    @keyframes fl3 {
      0%,100% { transform:translate(0,0); opacity:0.25; }
      35%  { transform:translate(16px,-42px); opacity:0.6; }
      65%  { transform:translate(-22px,-28px); opacity:0.9; }
      85%  { transform:translate(6px,-52px); opacity:0.35; }
    }

    .prog {
      position: fixed;
      bottom: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(212,184,134,0.45),
        transparent
      );
      opacity: 0;
      z-index: 50;
      transition: opacity 0.5s ease;
    }

    .prog.run {
      opacity: 1;
      animation: progFill 9s linear forwards;
    }

    @keyframes progFill {
      to { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .bud { opacity: 0; }
      .p-out, .p-mid, .p-in, .p-tiny,
      .center-ring, .center-inner, .center-shine, .pollen-dot {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>

  <div class="tap-screen" id="tapScreen">
    <div class="pulse-wrap">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-dot"></div>
    </div>
    <div class="tap-text">tap to begin</div>
  </div>

  <div class="stage" id="stage">

    <svg class="flower-svg" id="flowerSvg"
         viewBox="0 0 600 600"
         xmlns="http://www.w3.org/2000/svg">

      <defs>
        <radialGradient id="gOut" cx="50%" cy="28%" r="65%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#FFFFFF"/>
          <stop offset="70%"  stop-color="#F8F4E8"/>
          <stop offset="100%" stop-color="#EDE5C8"/>
        </radialGradient>

        <radialGradient id="gMid" cx="50%" cy="30%" r="60%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#FFFFFF"/>
          <stop offset="65%"  stop-color="#F5F0DE"/>
          <stop offset="100%" stop-color="#E8DFC4"/>
        </radialGradient>

        <radialGradient id="gIn" cx="50%" cy="35%" r="58%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#FFF9EE"/>
          <stop offset="100%" stop-color="#F0E8CC"/>
        </radialGradient>

        <radialGradient id="gCenter" cx="38%" cy="32%" r="55%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#EDD9A3"/>
          <stop offset="60%"  stop-color="#D4B886"/>
          <stop offset="100%" stop-color="#B89B60"/>
        </radialGradient>

        <radialGradient id="gCIn" cx="42%" cy="38%" r="52%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#F0E2B8"/>
          <stop offset="100%" stop-color="#C8A65A"/>
        </radialGradient>

        <radialGradient id="gGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="rgba(212,184,134,0.35)"/>
          <stop offset="100%" stop-color="rgba(212,184,134,0)"/>
        </radialGradient>
      </defs>

      <ellipse class="bud" cx="300" cy="300" rx="16" ry="30" fill="#EDE8D4"/>
      <ellipse class="bud" cx="300" cy="300" rx="10" ry="20" fill="#F5F1E0" style="animation-delay:3.65s;"/>

      <ellipse class="p-out po1" cx="300" cy="300" rx="42" ry="88"/>
      <ellipse class="p-out po2" cx="300" cy="300" rx="42" ry="88"/>
      <ellipse class="p-out po3" cx="300" cy="300" rx="42" ry="88"/>
      <ellipse class="p-out po4" cx="300" cy="300" rx="42" ry="88"/>
      <ellipse class="p-out po5" cx="300" cy="300" rx="42" ry="88"/>

      <ellipse class="p-mid pm1" cx="300" cy="300" rx="36" ry="74"/>
      <ellipse class="p-mid pm2" cx="300" cy="300" rx="36" ry="74"/>
      <ellipse class="p-mid pm3" cx="300" cy="300" rx="36" ry="74"/>
      <ellipse class="p-mid pm4" cx="300" cy="300" rx="36" ry="74"/>
      <ellipse class="p-mid pm5" cx="300" cy="300" rx="36" ry="74"/>

      <ellipse class="p-in pi1" cx="300" cy="300" rx="24" ry="50"/>
      <ellipse class="p-in pi2" cx="300" cy="300" rx="24" ry="50"/>
      <ellipse class="p-in pi3" cx="300" cy="300" rx="24" ry="50"/>
      <ellipse class="p-in pi4" cx="300" cy="300" rx="24" ry="50"/>

  <script>
    (function () {

      var tapScreen = document.getElementById('tapScreen');
      var stage     = document.getElementById('stage');
      var flowerSvg = document.getElementById('flowerSvg');
      var prog      = document.getElementById('prog');
      var started   = false;
      var ctx       = null;

      function createAudioCtx() {
        try {
          var AC = window.AudioContext || window.webkitAudioContext;
          return new AC();
        } catch (e) {
          return null;
        }
      }

      function playNote(audioCtx, freq, startTime, duration, peakVol, type) {
        try {
          var osc  = audioCtx.createOscillator();
          var gain = audioCtx.createGain();
          var now  = audioCtx.currentTime;

          osc.type = type || 'sine';
          osc.frequency.setValueAtTime(freq, now + startTime);

          gain.gain.setValueAtTime(0, now + startTime);
          gain.gain.linearRampToValueAtTime(peakVol, now + startTime + 0.025);
          gain.gain.exponentialRampToValueAtTime(peakVol * 0.55, now + startTime + 0.22);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + startTime + duration);

          osc.connect(gain);
          gain.connect(audioCtx.destination);

          osc.start(now + startTime);
          osc.stop(now + startTime + duration + 0.05);
        } catch (e) {}
      }

      function playHarmonic(audioCtx, freq, startTime, duration, vol) {
        playNote(audioCtx, freq * 2, startTime, duration * 0.7, vol * 0.18, 'triangle');
        playNote(audioCtx, freq * 3, startTime, duration * 0.5, vol * 0.06, 'sine');
      }

      function playBloomMusic() {
        ctx = createAudioCtx();
        if (!ctx) return;

        var melody = [
          [ 261.63,   0.0,   4.5,  0.13 ],
          [ 329.63,   0.32,  4.2,  0.12 ],
          [ 392.00,   0.64,  4.0,  0.12 ],
          [ 440.00,   0.96,  3.8,  0.11 ],
          [ 523.25,   1.3,   3.8,  0.12 ],
          [ 659.25,   1.7,   3.5,  0.10 ],
          [ 783.99,   2.2,   3.5,  0.10 ],
          [ 1046.50,  2.9,   4.5,  0.08 ],
        ];

        melody.forEach(function(n) {
          playNote(ctx, n[0], n[1], n[2], n[3], 'sine');
          playHarmonic(ctx, n[0], n[1], n[2], n[3]);
        });

        var chord = [
          [ 261.63, 3.5, 4.0, 0.08 ],
          [ 329.63, 3.5, 4.0, 0.07 ],
          [ 392.00, 3.5, 4.0, 0.07 ],
          [ 523.25, 3.5, 4.0, 0.07 ],
        ];

        chord.forEach(function(n) {
          playNote(ctx, n[0], n[1], n[2], n[3], 'sine');
        });

        playNote(ctx, 1567.98, 4.2, 3.5, 0.06, 'triangle');
        playNote(ctx, 2093.00, 4.6, 3.0, 0.04, 'triangle');

        playNote(ctx, 65.41, 0.0, 7.0, 0.09, 'sine');
        playNote(ctx, 130.81, 0.0, 7.0, 0.07, 'sine');
      }

      function begin() {
        if (started) return;
        started = true;

        tapScreen.classList.add('hidden');

        playBloomMusic();

        setTimeout(function() {
          stage.classList.add('active');
          prog.classList.add('run');
        }, 420);

        setTimeout(function() {
          if (ctx) {
            try {
              var masterGain = ctx.createGain();
              masterGain.gain.setValueAtTime(1, ctx.currentTime);
              masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.4);
            } catch(e) {}
          }

          document.body.classList.add('fade-out');

          setTimeout(function() {
            window.location.href = 'index.html';
          }, 1400);

        }, 9000);
      }

      document.body.addEventListener('click', begin);
      document.body.addEventListener('touchstart', begin, { passive: true });

    })();
  </script>
